<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050505" />
    <title>Startpage</title>
    <link rel="icon" href="favicon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Startpage" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>

  <body>
    <!-- App Shell -->
    <div class="app-shell">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <span class="logo-icon">⌘</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item active" data-cat="all">
            <span class="icon">◎</span>
            <span class="label">Overview</span>
          </button>

          <div class="nav-divider"></div>

          <div id="sidebar-categories" class="nav-group">
            <!-- Categories injected here -->
          </div>
        </nav>

        <div class="sidebar-footer">
          <button id="help-toggle" class="nav-item" title="Help (?)">
            <span class="icon">?</span>
            <span class="label">Help</span>
          </button>
          <button id="settings-toggle" class="nav-item" title="Settings">
            <span class="icon">⚙</span>
            <span class="label">Settings</span>
          </button>
          <button id="theme-toggle" class="nav-item" title="Toggle Theme">
            <span class="icon">◑</span>
            <span class="label">Theme</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Header -->
        <header class="header">
          <button
            class="sidebar-toggle"
            id="sidebar-toggle"
            aria-label="Toggle navigation"
            aria-expanded="false"
          >
            <span></span><span></span><span></span>
          </button>
          <div class="greeting-wrap">
            <h1 id="greeting">Good Morning,</h1>
            <p id="date-display">Friday, October 16</p>
          </div>

          <div class="header-right">
            <button
              id="tailscale-chip"
              class="tailscale-chip"
              type="button"
              data-state="unknown"
              title="Tailscale — not checked yet"
            >
              <span class="status-dot status-dot-unknown"></span>
              <span class="tailscale-label">Tailscale</span>
            </button>
            <button
              id="weather-chip"
              class="weather-chip"
              type="button"
              title="Weather settings"
            >
              <span class="weather-icon">⚙</span>
              <span class="weather-temp">Set up weather</span>
            </button>
            <div class="timer-wrap">
              <span id="clock" class="clock">12:00</span>
            </div>

            <div class="search-container">
              <button
                id="engine-chip"
                class="engine-chip"
                type="button"
                title="Switch search engine"
              >
                <span class="engine-label">DDG</span>
                <span class="engine-caret">▾</span>
              </button>
              <input
                id="filter"
                type="text"
                placeholder="Search shortcuts or the web…"
                autocomplete="off"
                spellcheck="false"
              />
              <div id="engine-menu" class="engine-menu" hidden></div>
            </div>
          </div>
        </header>

        <!-- Dynamic View -->
        <div id="view-container" class="view-container">
          <!-- Content injected here (Grid) -->
        </div>
      </main>
    </div>

    <!-- Background Decoration -->
    <div class="ambient-light"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
